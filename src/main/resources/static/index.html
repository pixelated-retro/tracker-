<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackIt — Application Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #000000;
    }
    
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Sliding Cursor Navigation Styles */
    .nav-container {
      position: relative;
      display: flex;
      width: fit-content;
      border-radius: 9999px;
      border: 2px solid #000000;
      background-color: #ffffff;
      padding: 4px;
    }

    .nav-tab {
      position: relative;
      z-index: 10;
      display: block;
      cursor: pointer;
      padding: 6px 12px;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #ffffff;
      mix-blend-mode: difference;
      transition: color 0.2s;
      white-space: nowrap;
    }

    @media (min-width: 768px) {
      .nav-tab {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
    }

    .nav-cursor {
      position: absolute;
      z-index: 0;
      height: 28px;
      border-radius: 9999px;
      background-color: #000000;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      pointer-events: none;
    }

    @media (min-width: 768px) {
      .nav-cursor {
        height: 38px;
      }
    }

    /* Structured Form Styles */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666666;
      font-weight: 600;
    }

    .field-input {
      width: 100%;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      background: #fafafa;
      transition: all 0.2s;
    }

    .field-input:focus {
      border-color: #000000;
      background: #ffffff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
    }

    /* Card Styles */
    .app-card {
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      transition: all 0.2s;
      background: #ffffff;
    }

    .app-card:hover {
      border-color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 9999px;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .badge-applied { background: #f0f0f0; color: #000000; }
    .badge-interview { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .badge-offer { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
    .badge-rejected { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

    .btn-black {
      background: #000000;
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-black:hover {
      opacity: 0.8;
      transform: scale(1.02);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50/30">
  <div class="max-w-5xl mx-auto px-6 py-12 md:py-20">
    <!-- Header -->
    <header class="flex flex-col items-center mb-16 text-center">
      <div class="mb-10">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-2">TRACKIT</h1>
        <p class="text-slate-400 font-medium uppercase tracking-widest text-xs">Professional Intelligence System</p>
      </div>
      
      <!-- Combined Filters -->
      <div class="flex flex-col gap-6 w-full items-center">
        <!-- Status Filter -->
        <div class="flex flex-col items-center gap-3">
          <span class="text-[9px] mono font-bold text-slate-300 uppercase tracking-widest">Phase Filter</span>
          <div class="nav-container" id="status-nav">
            <div class="nav-cursor" id="status-cursor"></div>
            <div class="nav-tab active" data-val="all" onclick="setStatusFilter('all', this)">All</div>
            <div class="nav-tab" data-val="APPLIED" onclick="setStatusFilter('APPLIED', this)">Applied</div>
            <div class="nav-tab" data-val="INTERVIEW" onclick="setStatusFilter('INTERVIEW', this)">Interview</div>
            <div class="nav-tab" data-val="OFFER" onclick="setStatusFilter('OFFER', this)">Offer</div>
            <div class="nav-tab" data-val="REJECTED" onclick="setStatusFilter('REJECTED', this)">Rejected</div>
          </div>
        </div>

        <!-- Type Filter -->
        <div class="flex flex-col items-center gap-3">
          <span class="text-[9px] mono font-bold text-slate-300 uppercase tracking-widest">Category Filter</span>
          <div class="nav-container" id="type-nav">
            <div class="nav-cursor" id="type-cursor"></div>
            <div class="nav-tab active" data-val="all" onclick="setTypeFilter('all', this)">All Types</div>
            <div class="nav-tab" data-val="JOB" onclick="setTypeFilter('JOB', this)">Jobs</div>
            <div class="nav-tab" data-val="INTERNSHIP" onclick="setTypeFilter('INTERNSHIP', this)">Internships</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Metrics -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
      <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
        <div class="field-label mb-2">Total Applied</div>
        <div id="cnt-applied" class="text-3xl font-bold">0</div>
      </div>
      <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
        <div class="field-label mb-2">Interviews</div>
        <div id="cnt-interview" class="text-3xl font-bold">0</div>
      </div>
      <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
        <div class="field-label mb-2">Offers</div>
        <div id="cnt-offer" class="text-3xl font-bold text-emerald-600">0</div>
      </div>
      <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
        <div class="field-label mb-2">Rejections</div>
        <div id="cnt-rejected" class="text-3xl font-bold text-rose-600">0</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
      <div class="relative w-full md:max-w-md">
        <input id="search" type="text" placeholder="Search by role, company..." oninput="onSearch()" 
               class="w-full bg-white border border-slate-200 rounded-full px-6 py-3 text-sm outline-none focus:border-black transition-all shadow-sm">
      </div>
      <button id="static-add-btn" onclick="openModal()" class="btn-black flex items-center gap-2 shadow-lg shadow-black/10">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Application
      </button>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="hidden mb-6 p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-xs mono uppercase tracking-wider"></div>

    <!-- List -->
    <div id="list" class="space-y-3">
      <div class="text-center py-20 text-slate-300 mono text-xs uppercase tracking-widest">System Ready...</div>
    </div>
  </div>

  <!-- Modal -->
  <div id="overlay" onclick="overlayClick(event)" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm items-center justify-center p-6">
    <div class="bg-white w-full max-w-2xl rounded-3xl p-8 md:p-12 shadow-2xl animate-in zoom-in duration-200">
      <div class="flex justify-between items-center mb-10">
        <h2 id="modal-title" class="text-2xl font-black tracking-tighter">ADD RECORD</h2>
        <button onclick="closeModal()" class="text-slate-300 hover:text-black transition-colors">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="field-group">
            <label class="field-label">Position Name <span class="text-rose-500">*</span></label>
            <input id="f-role" type="text" placeholder="e.g. Frontend Developer" class="field-input" oninput="clearInputError('f-role')">
          </div>
          <div class="field-group">
            <label class="field-label">Company / Organization <span class="text-rose-500">*</span></label>
            <input id="f-company" type="text" placeholder="e.g. Vercel" class="field-input" oninput="clearInputError('f-company')">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="field-group">
            <label class="field-label">Employment Type</label>
            <select id="f-type" class="field-input appearance-none">
              <option value="INTERNSHIP">Internship</option>
              <option value="JOB">Full-time Job</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Current Phase</label>
            <select id="f-status" class="field-input appearance-none">
              <option value="APPLIED">Applied</option>
              <option value="INTERVIEW">Interview</option>
              <option value="OFFER">Offer</option>
              <option value="REJECTED">Rejected</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="field-group">
            <label class="field-label">Application Date <span class="text-rose-500">*</span></label>
            <input id="f-date" type="date" class="field-input" oninput="clearInputError('f-date')">
          </div>
          <div class="field-group">
            <label class="field-label">Location</label>
            <input id="f-location" type="text" placeholder="e.g. Remote / New York" class="field-input">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Compensation Details</label>
          <input id="f-salary" type="text" placeholder="e.g. $140,000 / yr" class="field-input">
        </div>

        <div class="field-group">
          <label class="field-label">Internal Notes</label>
          <textarea id="f-notes" class="field-input h-28 resize-none" placeholder="Add specific details or interview feedback..."></textarea>
        </div>
      </div>

      <div class="flex flex-col md:flex-row gap-4 mt-10">
        <button onclick="closeModal()" class="order-2 md:order-1 flex-1 py-3 text-slate-400 hover:text-black transition-colors font-bold uppercase tracking-widest text-xs">Discard</button>
        <button id="btn-save" onclick="saveApp()" class="order-1 md:order-2 flex-1 btn-black">Save Application</button>
      </div>
    </div>
  </div>

  <!-- Status Picker -->
  <div id="status-pick" onclick="closeStatusPick(event)" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-md items-center justify-center">
    <div class="bg-white p-8 rounded-3xl min-w-[320px] shadow-2xl">
      <h3 class="field-label mb-6 text-center">Update Status</h3>
      <div class="space-y-2">
        <button onclick="pickStatus('APPLIED')" class="w-full text-left p-4 rounded-2xl hover:bg-black hover:text-white transition-all font-semibold">Applied</button>
        <button onclick="pickStatus('INTERVIEW')" class="w-full text-left p-4 rounded-2xl hover:bg-black hover:text-white transition-all font-semibold">Interview</button>
        <button onclick="pickStatus('OFFER')" class="w-full text-left p-4 rounded-2xl hover:bg-black hover:text-white transition-all font-semibold">Offer</button>
        <button onclick="pickStatus('REJECTED')" class="w-full text-left p-4 rounded-2xl hover:bg-black hover:text-white transition-all font-semibold">Rejected</button>
      </div>
    </div>
  </div>

  <!-- Floating Action Button -->
  <button id="floating-add-btn" onclick="openModal()" style="transform:scale(0);opacity:0;" class="fixed bottom-8 right-8 z-[90] bg-black text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all duration-300">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Delete Confirmation Modal -->
  <div id="delete-confirm" onclick="closeDeleteConfirm(event)" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-md items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center">
      <div class="w-14 h-14 mx-auto mb-6 rounded-full bg-rose-50 border border-rose-100 flex items-center justify-center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <h3 class="text-lg font-black tracking-tight mb-2">DELETE RECORD</h3>
      <p class="text-sm text-slate-400 mb-1">This action cannot be undone.</p>
      <p id="delete-confirm-detail" class="text-xs mono text-slate-300 uppercase tracking-wider mb-8"></p>
      <div class="flex gap-3">
        <button onclick="cancelDelete()" class="flex-1 py-3 rounded-2xl border border-slate-200 text-slate-500 hover:border-black hover:text-black transition-all font-bold uppercase tracking-widest text-xs">Cancel</button>
        <button id="btn-confirm-delete" onclick="confirmDelete()" class="flex-1 py-3 rounded-2xl bg-rose-600 text-white hover:bg-rose-700 transition-all font-bold uppercase tracking-widest text-xs">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api/applications';
    let activeStatusFilter = 'all';
    let activeTypeFilter = 'all';
    let searchTimer = null;
    let editingId = null;
    let statusTargetId = null;

    // Sliding Cursor Logic
    function setupNav(navId, cursorId) {
      const nav = document.getElementById(navId);
      const cursor = document.getElementById(cursorId);
      const tabs = nav.querySelectorAll('.nav-tab');

      function updateCursor(tab) {
        if (!tab) {
          cursor.style.opacity = '0';
          return;
        }
        cursor.style.width = `${tab.offsetWidth}px`;
        cursor.style.left = `${tab.offsetLeft}px`;
        cursor.style.opacity = '1';
      }

      tabs.forEach(tab => {
        tab.addEventListener('mouseenter', () => updateCursor(tab));
      });

      nav.addEventListener('mouseleave', () => {
        const activeTab = nav.querySelector('.nav-tab.active');
        updateCursor(activeTab);
      });

      // Initial position
      setTimeout(() => updateCursor(nav.querySelector('.nav-tab.active')), 100);
    }

    setupNav('status-nav', 'status-cursor');
    setupNav('type-nav', 'type-cursor');

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ message: 'Request failed' }));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      return res.status === 204 ? null : res.json();
    }

    async function loadStats() {
      try {
        const stats = await apiFetch(`${API}/stats`);
        document.getElementById('cnt-applied').textContent = stats.applied;
        document.getElementById('cnt-interview').textContent = stats.interview;
        document.getElementById('cnt-offer').textContent = stats.offer;
        document.getElementById('cnt-rejected').textContent = stats.rejected;
      } catch (e) {}
    }

    async function loadList() {
      const list = document.getElementById('list');
      list.innerHTML = '<div class="text-center py-20 text-slate-200 mono text-xs uppercase tracking-widest animate-pulse">Synchronizing Data...</div>';

      const search = document.getElementById('search').value.trim();
      let params = new URLSearchParams();
      
      if (search) params.append('search', search);
      if (activeStatusFilter !== 'all') params.append('status', activeStatusFilter);
      if (activeTypeFilter !== 'all') params.append('type', activeTypeFilter);

      const url = API + '?' + params.toString();

      try {
        const apps = await apiFetch(url);
        hideError();
        renderList(apps);
      } catch (e) {
        showError('Network Error: Unable to sync with master database.');
        list.innerHTML = '';
      }
    }

    function renderList(apps) {
      const list = document.getElementById('list');
      if (apps.length === 0) {
        list.innerHTML = `
          <div class="text-center py-32 border-2 border-dashed border-slate-100 rounded-3xl">
            <p class="text-slate-300 mono text-xs uppercase tracking-widest">No Entries Detected</p>
          </div>`;
        return;
      }

      list.innerHTML = apps.map(a => `
        <div class="app-card p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-1">
              <h3 class="text-lg font-bold tracking-tight">${esc(a.role)}</h3>
              <span class="text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded uppercase tracking-tighter">${a.type}</span>
            </div>
            <p class="text-slate-400 font-medium text-sm mb-4">${esc(a.company)}</p>
            <div class="flex flex-wrap gap-5">
              <div class="flex items-center gap-2 text-[10px] mono text-slate-400 uppercase tracking-wider">
                <span class="text-slate-200 font-bold">Applied:</span> ${a.dateApplied}
              </div>
              ${a.location ? `
              <div class="flex items-center gap-2 text-[10px] mono text-slate-400 uppercase tracking-wider">
                <span class="text-slate-200 font-bold">Loc:</span> ${esc(a.location)}
              </div>` : ''}
              ${a.salaryRange ? `
              <div class="flex items-center gap-2 text-[10px] mono text-emerald-500 uppercase tracking-wider">
                <span class="text-emerald-100 font-bold">Comp:</span> ${esc(a.salaryRange)}
              </div>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-5 w-full md:w-auto">
            <button onclick="openStatusPick(${a.id})" class="badge badge-${a.status.toLowerCase()} transition-all hover:scale-105">
              ${a.status}
            </button>
            <div class="flex gap-2">
              <button onclick="openEdit(${a.id})" class="p-2 text-slate-300 hover:text-black transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button onclick="deleteApp(${a.id})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
        </div>`).join('');
    }

    function setStatusFilter(val, el) {
      activeStatusFilter = val;
      const nav = document.getElementById('status-nav');
      nav.querySelectorAll('.nav-tab').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadList();
    }

    function setTypeFilter(val, el) {
      activeTypeFilter = val;
      const nav = document.getElementById('type-nav');
      nav.querySelectorAll('.nav-tab').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      loadList();
    }

    function onSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadList, 350);
    }

    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'ADD RECORD';
      document.getElementById('btn-save').textContent = 'Save Application';
      clearForm();
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('overlay').classList.replace('hidden', 'flex');
    }

    async function openEdit(id) {
      try {
        const app = await apiFetch(`${API}/${id}`);
        editingId = id;
        document.getElementById('modal-title').textContent = 'EDIT RECORD';
        document.getElementById('btn-save').textContent = 'Update Application';
        document.getElementById('f-role').value = app.role;
        document.getElementById('f-company').value = app.company;
        document.getElementById('f-type').value = app.type;
        document.getElementById('f-status').value = app.status;
        document.getElementById('f-date').value = app.dateApplied;
        document.getElementById('f-location').value = app.location || '';
        document.getElementById('f-salary').value = app.salaryRange || '';
        document.getElementById('f-notes').value = app.notes || '';
        document.getElementById('overlay').classList.replace('hidden', 'flex');
      } catch (e) { showToast('Load failed', 'error'); }
    }

    function closeModal() { document.getElementById('overlay').classList.replace('flex', 'hidden'); }
    function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

    function clearForm() {
      ['f-role','f-company','f-location','f-salary','f-notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-type').value = 'INTERNSHIP';
      document.getElementById('f-status').value = 'APPLIED';
      clearAllErrors();
    }

    function clearInputError(id) {
      const el = document.getElementById(id);
      el.classList.remove('border-rose-500', 'bg-rose-50');
    }

    function showInputError(id) {
      const el = document.getElementById(id);
      el.classList.add('border-rose-500', 'bg-rose-50');
    }

    function clearAllErrors() {
      ['f-role', 'f-company', 'f-date'].forEach(clearInputError);
    }

    async function saveApp() {
      clearAllErrors();
      const payload = {
        role: document.getElementById('f-role').value.trim(),
        company: document.getElementById('f-company').value.trim(),
        type: document.getElementById('f-type').value,
        status: document.getElementById('f-status').value,
        dateApplied: document.getElementById('f-date').value,
        location: document.getElementById('f-location').value.trim() || null,
        salaryRange: document.getElementById('f-salary').value.trim() || null,
        notes: document.getElementById('f-notes').value.trim() || null
      };

      let hasErrors = false;
      if (!payload.role) { showInputError('f-role'); hasErrors = true; }
      if (!payload.company) { showInputError('f-company'); hasErrors = true; }
      if (!payload.dateApplied) { showInputError('f-date'); hasErrors = true; }

      if (hasErrors) {
        showToast('Required fields missing', 'error');
        return;
      }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        if (editingId) await apiFetch(`${API}/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiFetch(API, { method: 'POST', body: JSON.stringify(payload) });
        showToast(editingId ? 'Record updated' : 'Application tracked', 'success');
        closeModal();
        loadList();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
      finally {
        btn.disabled = false;
        btn.textContent = editingId ? 'Update Application' : 'Save Application';
      }
    }

    let deleteTargetId = null;

    function deleteApp(id) {
      deleteTargetId = id;
      // Try to show role & company from the rendered card
      const card = document.querySelector(`[onclick="deleteApp(${id})"]`);
      let detail = '';
      if (card) {
        const row = card.closest('.app-card');
        if (row) {
          const role = row.querySelector('h3');
          const company = row.querySelector('p');
          if (role && company) detail = `${role.textContent.trim()} @ ${company.textContent.trim()}`;
        }
      }
      document.getElementById('delete-confirm-detail').textContent = detail;
      document.getElementById('delete-confirm').classList.replace('hidden', 'flex');
    }

    function cancelDelete() {
      deleteTargetId = null;
      document.getElementById('delete-confirm').classList.replace('flex', 'hidden');
    }

    function closeDeleteConfirm(e) {
      if (e.target === document.getElementById('delete-confirm')) cancelDelete();
    }

    async function confirmDelete() {
      if (!deleteTargetId) return;
      const btn = document.getElementById('btn-confirm-delete');
      btn.disabled = true;
      btn.textContent = 'Deleting...';
      try {
        await apiFetch(`${API}/${deleteTargetId}`, { method: 'DELETE' });
        showToast('Record removed', 'success');
        loadList();
        loadStats();
      } catch (e) { showToast('Delete failed', 'error'); }
      finally {
        btn.disabled = false;
        btn.textContent = 'Delete';
        cancelDelete();
      }
    }

    function openStatusPick(id) {
      statusTargetId = id;
      document.getElementById('status-pick').classList.replace('hidden', 'flex');
    }

    function closeStatusPick(e) {
      if (e.target === document.getElementById('status-pick')) {
        document.getElementById('status-pick').classList.replace('flex', 'hidden');
      }
    }

    async function pickStatus(status) {
      document.getElementById('status-pick').classList.replace('flex', 'hidden');
      try {
        await apiFetch(`${API}/${statusTargetId}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        showToast('Status updated', 'success');
        loadList();
        loadStats();
      } catch (e) { showToast('Update failed', 'error'); }
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `fixed bottom-10 right-10 z-[100] px-8 py-4 rounded-2xl bg-black text-white text-xs mono uppercase tracking-widest shadow-2xl animate-in slide-in-from-bottom-10 duration-500`;
      if (type === 'error') t.classList.add('text-rose-500');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.textContent = msg;
      b.classList.remove('hidden');
    }

    function hideError() { document.getElementById('error-banner').classList.add('hidden'); }

    function initFAB() {
      const staticBtn = document.getElementById('static-add-btn');
      const floatingBtn = document.getElementById('floating-add-btn');
      if (!staticBtn || !floatingBtn) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            floatingBtn.style.transform = 'scale(0)';
            floatingBtn.style.opacity = '0';
          } else {
            floatingBtn.style.transform = 'scale(1)';
            floatingBtn.style.opacity = '1';
          }
        });
      }, { threshold: 0 });

      observer.observe(staticBtn);
    }

    loadStats();
    loadList();
    initFAB();
  </script>
</body>
</html>
