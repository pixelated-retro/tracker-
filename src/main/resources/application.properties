# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# H2 In-Memory Database
# ===========================
spring.datasource.url=jdbc:h2:mem:trackitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# H2 Console (http://localhost:8080/h2-console)
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===========================
# Swagger UI (http://localhost:8080/swagger-ui.html)
# ===========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ===========================
# Logging
# ===========================
logging.level.com.trackit=DEBUG
logging.level.org.springframework.web=INFO
spring.jpa.defer-datasource-initialization=true

# ===========================
# Google OAuth2 Credentials
# ===========================
google.client.id=${GOOGLE_CLIENT_ID:dummy-id}
google.client.secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
google.redirect.uri=http://localhost:8080/api/auth/google/callback
